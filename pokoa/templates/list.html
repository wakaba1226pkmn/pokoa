<h2>一覧</h2>

<h3>街ごとの匹数</h3>
<ul>
{% for t in towns %}
  <li>{{ t }} : {{ counts[t] }}匹</li>
{% endfor %}
</ul>

<table border="1">
<tr>
  <th>名前</th>
  <th>得意1</th>
  <th>得意2</th>
  <th>街</th>
</tr>

{% for d in data %}
<tr>
  <td>{{ d.name }}</td>
  <td>{{ d.skill1 }}</td>
  <td>{{ d.skill2 }}</td>
  <td>{{ d.town if d.town else "未設定" }}</td>
</tr>
{% endfor %}
</table>
