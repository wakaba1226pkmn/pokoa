<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ぽこあポケモン管理システム</title>

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;

    background-image: url("/static/bk.jpg");
    background-size: cover;
    background-position: center;
}

/* メイン枠 */
.container {
    width: 90%;
    margin: 20px auto;
    background: rgba(255,255,255,0.95);
    border: 5px solid #000;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 8px 8px 0 #000;
}

/* タイトル */
h2 {
    text-align: center;
    margin-bottom: 10px;
}

/* ステータス（街ごとの数） */
.status-box {
    border: 3px solid #000;
    padding: 10px;
    margin-bottom: 15px;
    background: #fff;
}

.status-box table {
    width: 100%;
    border-collapse: collapse;
}

.status-box th, .status-box td {
    border: 2px solid #000;
    padding: 5px;
    text-align: center;
}

/* テーブル（図鑑風） */
.table-container {
    height: 500px;
    overflow-y: scroll;
    border: 3px solid #000;
    background: #fff;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 2px solid #000;
    padding: 6px;
    text-align: center;
}

th {
    position: sticky;
    top: 0;
    background: #ddd;
}

/* プルダウン */
select {
    border: 2px solid #000;
    padding: 3px;
    font-family: inherit;
}

/* ラジオボタン */
input[type="radio"] {
    transform: scale(1.2);
}

/* ボタン（ゲーム風） */
button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #ffcc00;
    border: 3px solid #000;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000;
}

button:active {
    transform: translate(4px,4px);
    box-shadow: none;
}

/* 下部メニュー */
.footer {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
}

/* メッセージ風 */
.message {
    border: 3px solid #000;
    padding: 10px;
    background: #fff;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>📘 ぽこあポケモン管理システム</h2>

<!-- 街ごとの集計 -->
<div class="status-box">
<h3>▶ 街ごとのポケモン数(合計307匹)</h3>
<table>
<tr>
{% for t in towns %}
    <th>{{ t }}</th>
{% endfor %}
</tr>
<tr>
{% for t in towns %}
    <td>{{ counts[t] }}</td>
{% endfor %}
</tr>
</table>
</div>

<form method="post" action="/bulk_update">

<!-- 図鑑一覧 -->
<div class="table-container">
<table>

<tr>
  <th>No</th>
  <th>ポケモン</th>
  <th>得意なこと1</th>
  <th>得意なこと2</th>
  <th>街</th>
  <th>出現有無</th>
</tr>

{% for p in all_pokemon %}
<tr>
  <td>{{ p.id }}</td>
  <td>{{ p.name }}</td>
  <td>{{ p.skill1 }}</td>
  <td>{{ p.skill2 }}</td>

  <!-- 街 -->
  <td>
    <select name="town_{{ p.id }}">
      {% for t in towns %}
      <option value="{{ t }}" {% if p.town == t %}selected{% endif %}>
        {{ t }}
      </option>
      {% endfor %}
    </select>
  </td>

  <!-- 出現 -->
  <td>
    <label>
      <input type="radio" name="active_{{ p.id }}" value="1"
      {% if p.is_active == 1 %}checked{% endif %}> 有
    </label>

    <label>
      <input type="radio" name="active_{{ p.id }}" value="0"
      {% if p.is_active == 0 %}checked{% endif %}> 無
    </label>
  </td>

</tr>
{% endfor %}

</table>
</div>

<button type="submit">▶ データを保存</button>

</form>

<!-- 下部 -->
<div class="footer">
    <div class="message">
        ▶ データを保存することでどの街にどのポケモンがいるか分かるよ！
    </div>
    <a href="/logout">▶ ログアウト</a>
</div>

</div>

</body>
</html>
