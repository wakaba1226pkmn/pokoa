<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぽこあポケモン管理システム</title>

<style>
body {
  margin: 0;
  height: 100vh;

  /* 背景（ゲーム風） */
  background-image: url("/static/bk.jpg");
  background-size: cover;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: "Courier New", monospace;
}

/* ゲーム風ウィンドウ */
.game-box {
  width: 320px;
  background: #f8f8f8;
  border: 4px solid #000;
  border-radius: 10px;
  padding: 20px;

  box-shadow: 6px 6px 0px #000;
}

/* タイトル */
.title {
  text-align: center;
  font-weight: bold;
  font-size: 20px;
  margin-bottom: 15px;
}

/* 入力欄 */
.input-box {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 6px;
  border: 2px solid #000;
  background: #fff;
  font-family: inherit;
}

/* ボタン（ゲーム風） */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;

  background: #ffcc00;
  border: 3px solid #000;
  font-weight: bold;
  cursor: pointer;

  box-shadow: 3px 3px 0px #000;
}

button:active {
  box-shadow: none;
  transform: translate(3px, 3px);
}

/* リンク */
.link {
  margin-top: 10px;
  text-align: center;
}

a {
  text-decoration: none;
  color: blue;
}

/* 下のメッセージ風 */
.message-box {
  margin-top: 15px;
  padding: 10px;
  border: 3px solid #000;
  background: #fff;
  font-size: 14px;
}

/* スマホ専用調整 */
@media (max-width: 480px) {

  .game-box {
    width: 80%;
    height: 40vh;
    padding: 10px;
  }

  .title {
    font-size: 18px;
  }

  input {
    font-size: 16px;
  }

  .input-box {
    width: 90%;
  }
 
  button {
    font-size: 18px;
    padding: 16px;
  }

  .message-box {
    font-size: 13px;
  }
}

</style>

</head>

<body>

<div class="game-box">

  <div class="title">🔴 ぽこあポケモン管理システム</div>

  <form method="post">
    <div class="input-box">
      ▶ ユーザID(半角英数字4～10文字)<br>
      <input name="username">
    </div>

    <div class="input-box">
      ▶ パスワード(半角英数字4～10文字)<br>
      <input type="password" name="password">
    </div>

    <button>ログイン</button>
  </form>

  <div class="link">
    <a href="/register">▶ はじめての方はこちら</a>
  </div>

  <div class="message-box">
    {% if error %}
      <span style="color:red;">
        ▶ エラー！<br>
        ▶ {{ error }}
      </span>
    {% else %}
      ▶ 各街のポケモンを管理しよう！
    {% endif %}
  </div>

</div>

</body>
</html>
