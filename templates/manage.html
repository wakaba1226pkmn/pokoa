<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぽこあポケモン管理システム</title>

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;

    background-image: url("/static/bk.jpg");
    background-size: cover;
    background-position: center;
}

/* メイン枠 */
.container {
    width: 90%;
    margin: 20px auto;
    background: rgba(255,255,255,0.95);
    border: 5px solid #000;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 8px 8px 0 #000;
}

/* タイトル */
h2 {
    text-align: center;
    margin-bottom: 10px;
}

/* ステータス（街ごとの数） */
.status-box {
    border: 3px solid #000;
    padding: 10px;
    margin-bottom: 15px;
    background: #fff;
}

.status-box table {
    width: 100%;
    border-collapse: collapse;
}

.status-box th, .status-box td {
    border: 2px solid #000;
    padding: 5px;
    text-align: center;
}

/* テーブル（図鑑風） */
.table-container {
    height: 500px;
    overflow-y: scroll;
    border: 3px solid #000;
    background: #fff;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 2px solid #000;
    padding: 6px;
    text-align: center;
}

th {
    position: sticky;
    top: 0;
    background: #ddd;
    z-index: 1; /* スマホ時のレイアウト崩れ防止用にz-index追加 */
}

/* プルダウン */
select {
    border: 2px solid #000;
    padding: 3px;
    font-family: inherit;
}

/* ラジオボタン */
input[type="radio"] {
    transform: scale(1.2);
}

/* ボタン（ゲーム風） */
button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #ffcc00;
    border: 3px solid #000;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000;
}

button:active {
    transform: translate(4px,4px);
    box-shadow: none;
}

/* 下部メニュー */
.footer {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
}

/* メッセージ風 */
.message {
    border: 3px solid #000;
    padding: 10px;
    background: #fff;
    margin-top: 10px;
}

/* ==========================================
   スマホ用レスポンシブデザイン（画面幅768px以下）
   ※PC表示には影響しません
   ========================================== */
@media screen and (max-width: 768px) {
    /* コンテナの余白とサイズをスマホ向けに調整 */
    .container {
        width: 95%;
        padding: 10px;
        margin: 10px auto;
        border-width: 3px;
        box-shadow: 4px 4px 0 #000;
    }

    /* 上部ステータスを横スクロール可能に */
    .status-box {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 5px;
    }
    .status-box table {
        white-space: nowrap; /* テキストの折り返しを防ぐ */
    }

    /* 図鑑テーブルをカード型レイアウトに変更 */
    .table-container {
        height: auto;
        max-height: 60vh;
        border: none;
        background: transparent;
    }

    /* メインのテーブル要素をブロック化して縦並びに */
    .table-container table, 
    .table-container thead, 
    .table-container tbody, 
    .table-container th, 
    .table-container td, 
    .table-container tr {
        display: block;
        width: 100%;
        box-sizing: border-box;
    }

    /* PC用のテーブルヘッダーは非表示 */
    .table-container thead {
        display: none;
    }

    /* 1行分を1つのカードとして装飾 */
    .table-container tr {
        margin-bottom: 15px;
        border: 3px solid #000;
        border-radius: 8px;
        background: #fff;
    }

    /* セル（各項目）のレイアウト調整 */
    .table-container td {
        position: relative;
        padding: 10px 10px 10px 35%; /* 左側に擬似要素（見出し）用のスペースを確保 */
        text-align: right;
        border: none;
        border-bottom: 1px dashed #ccc;
        min-height: 45px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
    }

    .table-container td:last-child {
        border-bottom: none;
    }

    /* data-label属性を使ってスマホ用の見出しを表示 */
    .table-container td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        width: 30%;
        text-align: left;
        font-weight: bold;
        font-size: 0.9em;
        color: #333;
    }

    /* フォーム要素の最適化 */
    select {
        max-width: 100%;
        font-size: 16px; /* iOSの自動ズーム防止 */
    }
    
    label {
        margin-left: 10px;
    }

    /* 保存ボタンを全幅にして押しやすく */
    button {
        width: 100%;
        font-size: 1.1em;
        padding: 15px;
    }

    /* フッターを縦並びに */
    .footer {
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    .message {
        font-size: 0.9em;
        width: 100%;
        box-sizing: border-box;
    }
    .footer a {
        display: block;
        width: 100%;
        text-align: center;
        padding: 12px;
        background: #eee;
        border: 2px solid #000;
        text-decoration: none;
        color: #000;
        font-weight: bold;
        box-sizing: border-box;
    }
}
</style>

</head>

<body>

<div class="container">

<h2>📘 ぽこあポケモン管理システム</h2>

<div class="status-box">
<h3>▶ 街ごとのポケモン数(合計307匹)</h3>
<table>
<tr>
{% for t in towns %}
    <th>{{ t }}</th>
{% endfor %}
</tr>
<tr>
{% for t in towns %}
    <td>{{ counts[t] }}</td>
{% endfor %}
</tr>
</table>
</div>

<form method="post" action="/bulk_update">

<div class="table-container">
<table>
<thead>
<tr>
  <th>No</th>
  <th>ポケモン</th>
  <th>得意なこと1</th>
  <th>得意なこと2</th>
  <th>街</th>
  <th>出現有無</th>
</tr>
</thead>

<tbody>
{% for p in all_pokemon %}
<tr>
  <td data-label="No">{{ p.id }}</td>
  <td data-label="ポケモン">{{ p.name }}</td>
  <td data-label="得意なこと1">{{ p.skill1 }}</td>
  <td data-label="得意なこと2">{{ p.skill2 }}</td>

  <td data-label="街">
    <select name="town_{{ p.id }}">
      {% for t in towns %}
      <option value="{{ t }}" {% if p.town == t %}selected{% endif %}>
        {{ t }}
      </option>
      {% endfor %}
    </select>
  </td>

  <td data-label="出現有無">
    <label>
      <input type="radio" name="active_{{ p.id }}" value="1"
      {% if p.is_active == 1 %}checked{% endif %}> 有
    </label>

    <label>
      <input type="radio" name="active_{{ p.id }}" value="0"
      {% if p.is_active == 0 %}checked{% endif %}> 無
    </label>
  </td>

</tr>
{% endfor %}
</tbody>

</table>
</div>

<button type="submit">▶ データを保存</button>

</form>

<div class="footer">
    <div class="message">
        ▶ データを保存することでどの街にどのポケモンがいるか分かるよ！
    </div>
    <a href="/logout">▶ ログアウト</a>
</div>

</div>

</body>
</html>
